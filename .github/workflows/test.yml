name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: pip install -e '.[dev]'

      - name: Run pytest
        run: python -m pytest -q

      - name: Smoke-test CLI
        run: |
          agent-cfi --version
          agent-cfi --help > /dev/null
          python examples/demo.py > /dev/null
          agent-cfi visualize --graph .agent-cfi/baseline.json > /dev/null
