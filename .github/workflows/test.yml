name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: pip install -e '.[dev]'

      - name: Run pytest
        run: python -m pytest -q

      - name: Smoke-test CLI
        run: |
          agent-cfi --version
          agent-cfi --help > /dev/null
          agent-cfi visualize --graph .agent-cfi/baseline.json > /dev/null
          agent-cfi fuzz-probes --out /tmp/fuzzed.yaml --count 2 --seed 1 > /dev/null
          # Verify demo.py runs end-to-end. Exit 1 is expected (findings detected),
          # so accept 0 or 1 and fail on anything else.
          set +e
          python examples/demo.py > /dev/null
          rc=$?
          set -e
          if [ "$rc" -ne 0 ] && [ "$rc" -ne 1 ]; then
            echo "demo.py exited with unexpected code $rc" >&2
            exit "$rc"
          fi
