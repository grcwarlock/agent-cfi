name: "agent-cfi"
description: "CI gate for AI agents. Fails on tool-call graph drift, new edges, or tainted sinks between main and this PR."
author: "grcwarlock"
branding:
  icon: "shield"
  color: "purple"

inputs:
  traces:
    description: "Path to JSONL trace file produced by this PR's eval run."
    required: true
  baseline:
    description: "Path to the committed baseline graph (usually .agent-cfi/baseline.json)."
    required: true
    default: ".agent-cfi/baseline.json"
  config:
    description: "Path to .agent-cfi/config.yaml."
    required: false
    default: ".agent-cfi/config.yaml"
  sarif:
    description: "Output path for SARIF findings."
    required: false
    default: "agent-cfi.sarif"
  upload-sarif:
    description: "Upload SARIF to GitHub Code Scanning."
    required: false
    default: "true"
  fail-on:
    description: "Comma-separated list of finding kinds that fail the build. Overrides config."
    required: false
    default: ""
  mcp-pins:
    description: "Path to an MCP pin file produced by `agent-cfi mcp-pin` (optional). Requires mcp-current."
    required: false
    default: ""
  mcp-current:
    description: "Path to a JSON file of live MCP tool schemas for this PR (optional). Requires mcp-pins."
    required: false
    default: ""
  python-version:
    description: "Python version used to run agent-cfi."
    required: false
    default: "3.12"

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install agent-cfi
      shell: bash
      run: pip install -e "$GITHUB_ACTION_PATH"

    - name: Run agent-cfi check
      id: check
      shell: bash
      run: |
        args=(
          --baseline "${{ inputs.baseline }}"
          --current  "${{ inputs.traces }}"
          --config   "${{ inputs.config }}"
          --sarif    "${{ inputs.sarif }}"
        )
        if [ -n "${{ inputs.fail-on }}" ]; then
          args+=(--fail-on "${{ inputs.fail-on }}")
        fi
        if [ -n "${{ inputs.mcp-pins }}" ] && [ -n "${{ inputs.mcp-current }}" ]; then
          args+=(--mcp-pins "${{ inputs.mcp-pins }}" --mcp-current "${{ inputs.mcp-current }}")
        elif [ -n "${{ inputs.mcp-pins }}" ] || [ -n "${{ inputs.mcp-current }}" ]; then
          echo "::error::mcp-pins and mcp-current must be provided together."
          exit 2
        fi
        agent-cfi check "${args[@]}"

    - name: Upload SARIF to Code Scanning
      if: ${{ always() && inputs.upload-sarif == 'true' }}
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ inputs.sarif }}
        category: agent-cfi
