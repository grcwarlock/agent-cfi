name: "agent-cfi"
description: "Control Flow Integrity for AI agents. Diff the tool-call graph between main and this PR; fail on new edges, drift, or tainted sinks."
author: "agent-cfi contributors"
branding:
  icon: "shield"
  color: "purple"

inputs:
  traces:
    description: "Path to JSONL trace file produced by this PR's eval run."
    required: true
  baseline:
    description: "Path to the committed baseline graph (usually .agent-cfi/baseline.json)."
    required: true
    default: ".agent-cfi/baseline.json"
  config:
    description: "Path to .agent-cfi/config.yaml."
    required: false
    default: ".agent-cfi/config.yaml"
  sarif:
    description: "Output path for SARIF findings."
    required: false
    default: "agent-cfi.sarif"
  upload-sarif:
    description: "Upload SARIF to GitHub Code Scanning."
    required: false
    default: "true"
  fail-on:
    description: "Comma-separated list of finding kinds that fail the build. Overrides config."
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install agent-cfi
      shell: bash
      run: pip install -e "$GITHUB_ACTION_PATH"

    - name: Run agent-cfi check
      id: check
      shell: bash
      run: |
        agent-cfi check \
          --baseline "${{ inputs.baseline }}" \
          --current "${{ inputs.traces }}" \
          --config "${{ inputs.config }}" \
          --sarif "${{ inputs.sarif }}" \
          ${{ inputs.fail-on && format('--fail-on {0}', inputs.fail-on) || '' }}

    - name: Upload SARIF to Code Scanning
      if: ${{ always() && inputs.upload-sarif == 'true' }}
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ inputs.sarif }}
        category: agent-cfi
